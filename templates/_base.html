<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LLM 攻防靶场{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">🛡️ LLM<span>SecRange</span></a>
    <div class="links">
      <a href="/ctf/">CTF 注入</a>
      <a href="/owasp/">OWASP Top10</a>
      <a href="/agent/">Agent 靶场</a>
      <a href="/catalog/">聚合清单</a>
    </div>
    <label class="target-sel" title="选择被攻击的目标模型">
      <span class="dot">●</span> target:
      <select id="model-select">
        {% for m in models %}
        <option value="{{ m.id }}" {{ 'selected' if m.id==current_model else '' }}>{{ m.label }} · {{ m.note }}</option>
        {% endfor %}
      </select>
    </label>
  </nav>
  <main class="wrap">
    {% block body %}{% endblock %}
  </main>
  <footer class="foot">
    本系统为<strong>授权的安全教育/渗透测试训练靶场</strong>，所有漏洞与危险操作均隔离在本地沙箱内。请勿用于真实攻击。
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block script %}{% endblock %}
</body>
</html>
